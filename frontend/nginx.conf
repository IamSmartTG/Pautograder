server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service (same-origin, so no CORS needed)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;   # grading can take up to ~30s
    }

    # SPA fallback so client-side routes (e.g. /problem/:id) resolve
    location / {
        try_files $uri /index.html;
    }
}
