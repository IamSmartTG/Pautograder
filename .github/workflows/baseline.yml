name: Generate interactive baseline

# Manual trigger — renders the reference solution inside the same browser
# sandbox image the grader uses, so the baseline is consistent with grading.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the browser sandbox image
        run: docker build -t pautograder-browser-sandbox docker/browser-sandbox/

      - name: Prepare reference solution + grader config
        run: |
          mkdir -p gen
          cp backend/problems/easy/interactive-001/test.spec.js gen/
          cat > gen/index.html <<'HTML'
          <!DOCTYPE html>
          <html>
            <body>
              <span data-testid="counter">0</span>
              <button onclick="document.querySelector('[data-testid=counter]').textContent =
                +document.querySelector('[data-testid=counter]').textContent + 1">Click me</button>
            </body>
          </html>
          HTML
          cat > gen/playwright.config.js <<'JS'
          module.exports = {
            snapshotPathTemplate: '{testFileDir}/__screenshots__/{arg}{ext}',
            expect: { toHaveScreenshot: { maxDiffPixelRatio: 0.05 } },
            use: { launchOptions: { args: ['--no-sandbox'] } },
          };
          JS

      - name: Render baseline inside the sandbox image
        run: |
          docker run --rm --shm-size=512m \
            -v "$GITHUB_WORKSPACE/gen:/submission" -w /submission \
            pautograder-browser-sandbox \
            playwright test test.spec.js \
            --config=/submission/playwright.config.js --update-snapshots

      - name: Copy baseline into the problem
        run: sudo cp gen/__screenshots__/baseline.png backend/problems/easy/interactive-001/baseline.png

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/problems/easy/interactive-001/baseline.png
          if git diff --cached --quiet; then
            echo "Baseline unchanged."
          else
            git commit -m "chore: generate interactive-001 baseline screenshot"
            git push
          fi
